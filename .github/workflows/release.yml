name: Release bot canary

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type DEPLOY_BOT_CANARY to build and deploy the current main SHA
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  gate:
    name: Release gate
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Require main and explicit confirmation
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
          RELEASE_REF: ${{ github.ref }}
        run: |
          test "$RELEASE_REF" = "refs/heads/main"
          test "$CONFIRMATION" = "DEPLOY_BOT_CANARY"

      - name: Require successful CI for the exact release SHA
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          test "$(gh api "repos/$REPOSITORY/commits/main" --jq .sha)" = "$RELEASE_SHA"
          gh api \
            "repos/$REPOSITORY/actions/workflows/ci.yml/runs?head_sha=$RELEASE_SHA&event=push&per_page=20" \
            | jq -e --arg sha "$RELEASE_SHA" \
              '.workflow_runs | length > 0 and .[0].head_sha == $sha and .[0].status == "completed" and .[0].conclusion == "success"'

  build:
    name: Publish image (${{ matrix.key }})
    needs: gate
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: admin
            image: vpn-admin
            env_key: VPN_ADMIN_IMAGE
            context: .
            dockerfile: ./Dockerfile
            target: admin
          - key: bot
            image: vpn-bot
            env_key: VPN_BOT_IMAGE
            context: .
            dockerfile: ./Dockerfile
            target: bot
          - key: billing
            image: vpn-billing
            env_key: VPN_BILLING_IMAGE
            context: .
            dockerfile: ./Dockerfile
            target: billing
          - key: migrations
            image: vpn-migrations
            env_key: VPN_MIGRATIONS_IMAGE
            context: .
            dockerfile: ./Dockerfile
            target: migrations
          - key: admin-frontend
            image: vpn-admin-frontend
            env_key: VPN_ADMIN_FRONTEND_IMAGE
            context: ./admin_frontend
            dockerfile: ./admin_frontend/Dockerfile
            target: ""
          - key: nginx
            image: vpn-nginx
            env_key: VPN_NGINX_IMAGE
            context: ./nginx
            dockerfile: ./nginx/Dockerfile
            target: ""
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: docker.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and publish immutable release image
        id: image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          platforms: linux/amd64
          push: true
          tags: docker.io/${{ secrets.REGISTRY_USERNAME }}/${{ matrix.image }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha,scope=${{ matrix.key }}
          cache-to: type=gha,mode=max,scope=${{ matrix.key }}
          provenance: mode=max
          sbom: true

      - name: Record image digest
        env:
          DIGEST: ${{ steps.image.outputs.digest }}
          ENV_KEY: ${{ matrix.env_key }}
          IMAGE: ${{ matrix.image }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
        run: |
          test "$DIGEST" != ""
          install -d -m 0700 release-fragment
          printf '%s=docker.io/%s/%s@%s\n' \
            "$ENV_KEY" "$REGISTRY_USERNAME" "$IMAGE" "$DIGEST" \
            > "release-fragment/${ENV_KEY}.env"

      - name: Upload digest fragment
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-${{ matrix.key }}
          path: release-fragment/*.env
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy bot canary
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    environment: production
    steps:
      - name: Check out release source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download image digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: release-fragments
          merge-multiple: true

      - name: Assemble fail-closed release environment
        env:
          ADMIN_PUBLIC_ORIGIN: ${{ vars.ADMIN_PUBLIC_ORIGIN }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          : "${DEPLOY_PATH:?production DEPLOY_PATH variable is required}"
          admin_public_origin="${ADMIN_PUBLIC_ORIGIN:-https://admin.vpn.andriyshkoy.ru}"
          [[ "$admin_public_origin" =~ ^https://[A-Za-z0-9][A-Za-z0-9.-]*(:[0-9]{1,5})?$ ]]
          test "$(find release-fragments -type f -name '*.env' | wc -l)" -eq 6
          sort release-fragments/*.env > release.env
          {
            printf 'RELEASE_SHA=%s\n' "$RELEASE_SHA"
            printf 'VPN_ENV_FILE=%s/.env\n' "$DEPLOY_PATH"
            printf 'VPN_MANAGER_TLS_DIR_PROD=/etc/vpn-hub/manager-pki\n'
            printf 'ADMIN_PUBLIC_ORIGIN=%s\n' "$admin_public_origin"
            printf 'MAINTENANCE_MODE=true\n'
            printf 'BILLING_ENABLED=false\n'
            printf 'PAYMENTS_ENABLED=false\n'
            printf 'PROVISIONING_ENABLED=false\n'
            printf 'NOTIFICATIONS_ENABLED=false\n'
            printf 'REFERRAL_REWARDS_ENABLED=true\n'
            printf 'REFERRAL_LEVEL_1_RATE_BPS=500\n'
            printf 'REFERRAL_LEVEL_2_RATE_BPS=100\n'
            printf 'REFERRAL_PROGRAM_VERSION=v1-5pct-1pct\n'
            printf 'VPN_DRIFT_REPAIR_ENABLED=false\n'
            printf 'OBSERVABILITY_ENABLED=false\n'
          } >> release.env
          chmod 0600 release.env
          test "$(grep -Ec '^VPN_(ADMIN|BOT|BILLING|MIGRATIONS|ADMIN_FRONTEND|NGINX)_IMAGE=docker.io/.+@sha256:[0-9a-f]{64}$' release.env)" -eq 6

      - name: Reconfirm current main and exact successful CI after approval
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ github.sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          test "$(gh api "repos/$REPOSITORY/commits/main" --jq .sha)" = "$RELEASE_SHA"
          gh api \
            "repos/$REPOSITORY/actions/workflows/ci.yml/runs?head_sha=$RELEASE_SHA&event=push&per_page=20" \
            | jq -e --arg sha "$RELEASE_SHA" \
              '.workflow_runs | length > 0
                and .[0].head_sha == $sha
                and .[0].status == "completed"
                and .[0].conclusion == "success"'

      - name: Prepare strict SSH identity
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          : "${SSH_PRIVATE_KEY:?SSH_PRIVATE_KEY is required}"
          : "${SSH_KNOWN_HOSTS:?SSH_KNOWN_HOSTS is required}"
          install -d -m 0700 "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/id_deploy"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 0600 "$HOME/.ssh/id_deploy" "$HOME/.ssh/known_hosts"
          ssh-keygen -y -f "$HOME/.ssh/id_deploy" >/dev/null

      - name: Upload reviewed release bundle
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          : "${DEPLOY_PATH:?DEPLOY_PATH is required}"
          : "${SSH_HOST:?SSH_HOST is required}"
          : "${SSH_USER:?SSH_USER is required}"
          release_dir="$DEPLOY_PATH/releases/$RELEASE_SHA"
          remote_tmp="/tmp/vpn-release-$RELEASE_SHA"
          ssh -i "$HOME/.ssh/id_deploy" -o BatchMode=yes -o StrictHostKeyChecking=yes \
            "$SSH_USER@$SSH_HOST" \
            "rm -rf '$remote_tmp' && \
             install -d -m 0700 '$remote_tmp' '$remote_tmp/observability'"
          scp -i "$HOME/.ssh/id_deploy" -o BatchMode=yes -o StrictHostKeyChecking=yes \
            release.env \
            docker-compose-prod.yml \
            deploy/preflight.sql \
            deploy/manager_smoke.py \
            deploy/telegram_smoke.py \
            deploy/production_canary.sh \
            deploy/activate_admin_hub.sh \
            deploy/promote_full_production.sh \
            "$SSH_USER@$SSH_HOST:$remote_tmp/"
          scp -i "$HOME/.ssh/id_deploy" -o BatchMode=yes -o StrictHostKeyChecking=yes \
            observability/alerts.yml \
            observability/prometheus.yml \
            observability/statsd-mapping.yml \
            "$SSH_USER@$SSH_HOST:$remote_tmp/observability/"
          ssh -i "$HOME/.ssh/id_deploy" -o BatchMode=yes -o StrictHostKeyChecking=yes \
            "$SSH_USER@$SSH_HOST" \
            "sudo -n install -d -m 0700 '$release_dir' && \
             sudo -n install -d -m 0755 '$release_dir/observability' && \
             sudo -n install -m 0600 '$remote_tmp/release.env' '$release_dir/release.env' && \
             sudo -n install -m 0600 '$remote_tmp/docker-compose-prod.yml' '$release_dir/docker-compose-prod.yml' && \
             sudo -n install -m 0600 '$remote_tmp/preflight.sql' '$release_dir/preflight.sql' && \
             sudo -n install -m 0600 '$remote_tmp/manager_smoke.py' '$release_dir/manager_smoke.py' && \
             sudo -n install -m 0600 '$remote_tmp/telegram_smoke.py' '$release_dir/telegram_smoke.py' && \
             sudo -n install -m 0644 '$remote_tmp/observability/alerts.yml' '$release_dir/observability/alerts.yml' && \
             sudo -n install -m 0644 '$remote_tmp/observability/prometheus.yml' '$release_dir/observability/prometheus.yml' && \
             sudo -n install -m 0644 '$remote_tmp/observability/statsd-mapping.yml' '$release_dir/observability/statsd-mapping.yml' && \
             sudo -n install -m 0700 '$remote_tmp/production_canary.sh' '$release_dir/production_canary.sh' && \
             sudo -n install -m 0700 '$remote_tmp/activate_admin_hub.sh' '$release_dir/activate_admin_hub.sh' && \
             sudo -n install -m 0700 '$remote_tmp/promote_full_production.sh' '$release_dir/promote_full_production.sh' && \
             rm -rf '$remote_tmp'"

      - name: Run guarded production deployment
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          release_dir="$DEPLOY_PATH/releases/$RELEASE_SHA"
          ssh -i "$HOME/.ssh/id_deploy" -o BatchMode=yes -o StrictHostKeyChecking=yes \
            "$SSH_USER@$SSH_HOST" \
            "sudo -n env DEPLOY_ROOT='$DEPLOY_PATH' RELEASE_DIR='$release_dir' RELEASE_SHA='$RELEASE_SHA' bash '$release_dir/production_canary.sh'"

      - name: Record deployment summary
        run: |
          {
            echo '### Production bot canary deployed'
            echo
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo '- Schema and accounting invariants verified.'
            echo '- Billing, new payments, provisioning, notifications, worker, and scheduler remain disabled.'
          } >> "$GITHUB_STEP_SUMMARY"
