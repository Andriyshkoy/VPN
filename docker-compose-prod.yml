services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  migrations:
    image: andriyshkoy/vpn-migrations:latest
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

  admin:
    image: andriyshkoy/vpn-admin:latest
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file:
      - .env
    restart: on-failure

  bot:
    image: andriyshkoy/vpn-bot:latest
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file:
      - .env
    restart: on-failure

  rq_worker:
    image: andriyshkoy/vpn-billing:latest
    command: ./billing_daemon/entrypoint_worker.sh
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    env_file:
      - .env
    restart: always

  rq_scheduler:
    image: andriyshkoy/vpn-billing:latest
    command: ./billing_daemon/entrypoint_scheduler.sh
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    env_file:
      - .env
    restart: always

  admin_frontend:
    image: andriyshkoy/vpn-admin-frontend:latest
    depends_on:
      - admin
    env_file:
      - ./admin_frontend/.env

  nginx:
    image: andriyshkoy/vpn-nginx:latest
    depends_on:
      - admin_frontend
    ports:
      - "14081:80"

volumes:
  db_data:
  redis_data:
