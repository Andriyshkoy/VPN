services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  migrations:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrations
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env

  admin:
    build:
      context: .
      dockerfile: Dockerfile
      target: admin
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file:
      - .env
    restart: on-failure

  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: bot
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    env_file:
      - .env
    restart: on-failure
    
  rq_worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: billing
    command: ./billing_daemon/entrypoint_worker.sh
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    env_file:
      - .env
    restart: always

  rq_scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: billing
    command: ./billing_daemon/entrypoint_scheduler.sh
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    env_file:
      - .env
    restart: always

  admin_frontend:
    build:
      context: ./admin_frontend
      dockerfile: Dockerfile
    depends_on: [admin]
    environment:
      VITE_ADMIN_API_URL: ${VITE_ADMIN_API_URL:-http://localhost:14081}

  nginx:
    build: ./nginx
    depends_on: [admin_frontend]
    ports:
      - "14081:80"
  
volumes:
  db_data:
  redis_data:
