server {
    listen 80;

    server_tokens off;

    location / {
        proxy_pass http://admin_frontend:5173/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api {
        proxy_pass http://admin:8000;
    }

    location /login {
        proxy_pass http://admin:8000/login;
    }

    # Operational endpoints are container-network only. Keep these exact
    # denials ahead of the SPA fallback if proxy routes change later.
    location = /metrics {
        return 404;
    }

    location = /health {
        return 404;
    }

    location = /ready {
        return 404;
    }
}
