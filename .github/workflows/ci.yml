name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  DATABASE_URL: "sqlite+aiosqlite:///:memory:"
  ENCRYPTION_KEY: "enzRByUskrWIx5OhIPZx5Lul803FqBJ_UFFFVRUybsk="
  BOT_TOKEN: "123456789:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
  POSTGRES_TEST_URL: "postgresql+asyncpg://vpn:vpn@127.0.0.1:5432/vpn_concurrency"

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16@sha256:5a65324fe84dc41709ff914e90b07f3e2f577073ed27bf917d4873aca0c9ec51
        env:
          POSTGRES_DB: vpn_concurrency
          POSTGRES_USER: vpn
          POSTGRES_PASSWORD: vpn
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vpn -d vpn_concurrency"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install --requirement requirements-dev.txt

      - name: Check formatting and imports
        run: |
          python -m black --check admin bot billing_daemon core deploy scripts tests
          python -m isort --check-only admin bot billing_daemon core deploy scripts tests

      - name: Compile Python modules
        run: python -m compileall -q admin bot billing_daemon core deploy scripts

      - name: Create isolated migration database
        env:
          PGPASSWORD: vpn
        run: >-
          psql --host 127.0.0.1 --username vpn --dbname postgres
          --set ON_ERROR_STOP=1
          --command 'CREATE DATABASE vpn_migration'

      - name: Run complete test suite
        run: pytest -q

      - name: Verify fresh PostgreSQL migrations
        env:
          DATABASE_URL: postgresql+asyncpg://vpn:vpn@127.0.0.1:5432/vpn_migration
        run: |
          alembic upgrade head
          alembic current
          alembic check
          test "$(psql 'postgresql://vpn:vpn@127.0.0.1:5432/vpn_migration' -Atc 'SELECT version_num FROM alembic_version')" = "d4e7f9a1b2c3"

  frontend:
    name: Frontend
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: admin_frontend
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: admin_frontend/package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Test frontend contracts and interactions
        run: npm test

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  compose:
    name: Production Compose
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    env:
      POSTGRES_DB: vpn
      POSTGRES_USER: vpn
      POSTGRES_PASSWORD: ci-only-password
      REDIS_PASSWORD: ci-only-redis-password
      VPN_ENV_FILE: .env.example
      VPN_MANAGER_TLS_DIR_PROD: /tmp/vpn-manager-pki
      MAINTENANCE_MODE: "true"
      BILLING_ENABLED: "false"
      PAYMENTS_ENABLED: "false"
      PROVISIONING_ENABLED: "false"
      NOTIFICATIONS_ENABLED: "false"
      REFERRAL_REWARDS_ENABLED: "true"
      REFERRAL_LEVEL_1_RATE_BPS: "500"
      REFERRAL_LEVEL_2_RATE_BPS: "100"
      REFERRAL_PROGRAM_VERSION: v1-5pct-1pct
      VPN_DRIFT_REPAIR_ENABLED: "false"
      OBSERVABILITY_ENABLED: "false"
      POSTGRES_EXPORTER_USER: metrics
      POSTGRES_EXPORTER_PASSWORD: ci-only-exporter-password
      VPN_MIGRATIONS_IMAGE: example.invalid/vpn-migrations@sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      VPN_ADMIN_IMAGE: example.invalid/vpn-admin@sha256:bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb
      VPN_BOT_IMAGE: example.invalid/vpn-bot@sha256:cccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccccc
      VPN_BILLING_IMAGE: example.invalid/vpn-billing@sha256:dddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddd
      VPN_ADMIN_FRONTEND_IMAGE: example.invalid/vpn-admin-frontend@sha256:eeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeee
      VPN_NGINX_IMAGE: example.invalid/vpn-nginx@sha256:ffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Render all production profiles
        run: |
          docker compose -f docker-compose-prod.yml \
            --profile hub \
            --profile bot \
            --profile worker \
            --profile billing-scheduler \
            --profile monitoring \
            config --quiet

      - name: Require digest-pinned production images
        run: |
          images="$(docker compose -f docker-compose-prod.yml \
            --profile hub \
            --profile bot \
            --profile worker \
            --profile billing-scheduler \
            --profile monitoring \
            config --images)"
          if grep -Ev '@sha256:[0-9a-f]{64}$' <<<"$images"; then
            echo "Production image without an immutable digest detected" >&2
            exit 1
          fi

      - name: Lint GitHub Actions workflows
        run: |
          docker run --rm \
            --volume "$PWD:/repo:ro" \
            --workdir /repo \
            rhysd/actionlint:1.7.7@sha256:887a259a5a534f3c4f36cb02dca341673c6089431057242cdc931e9f133147e9

      - name: Validate deployment shell behavior
        run: |
          shellcheck \
            deploy/production_canary.sh \
            deploy/activate_admin_hub.sh \
            tests/test_production_canary_cleanup.sh \
            tests/test_admin_hub_activation.sh
          bash tests/test_production_canary_cleanup.sh
          bash tests/test_admin_hub_activation.sh

  images:
    name: Image build (${{ matrix.key }})
    needs: [backend, frontend, compose]
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: admin
            context: .
            dockerfile: ./Dockerfile
            target: admin
          - key: bot
            context: .
            dockerfile: ./Dockerfile
            target: bot
          - key: billing
            context: .
            dockerfile: ./Dockerfile
            target: billing
          - key: migrations
            context: .
            dockerfile: ./Dockerfile
            target: migrations
          - key: admin-frontend
            context: ./admin_frontend
            dockerfile: ./admin_frontend/Dockerfile
            target: ""
          - key: nginx
            context: ./nginx
            dockerfile: ./nginx/Dockerfile
            target: ""
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build image without publishing
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          platforms: linux/amd64
          push: false
          tags: vpn-${{ matrix.key }}:ci-${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha,scope=${{ matrix.key }}
          cache-to: type=gha,mode=max,scope=${{ matrix.key }}
