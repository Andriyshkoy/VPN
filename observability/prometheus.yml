global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: vpn-hub-admin
    metrics_path: /metrics
    static_configs:
      - targets: ["admin:8000"]

  - job_name: vpn-hub-statsd
    static_configs:
      - targets: ["statsd_exporter:9102"]

  - job_name: vpn-hub-postgres
    static_configs:
      - targets: ["postgres_exporter:9187"]

  - job_name: vpn-hub-redis
    static_configs:
      - targets: ["redis_exporter:9121"]
