map $http_x_forwarded_proto $vpn_forwarded_proto {
    default $scheme;
    ~*^https$ https;
}

server {
    listen 80;

    server_tokens off;
    client_max_body_size 1m;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy same-origin always;
    add_header X-Frame-Options DENY always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; connect-src 'self'; font-src 'self'; form-action 'self'; frame-ancestors 'none'; img-src 'self' data:; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'" always;

    location / {
        proxy_pass http://admin_frontend:5173/;
        proxy_http_version 1.1;

        # Preserve the browser-visible authority, including a non-default
        # port in local/staged environments. The backend compares Origin to
        # Host for CSRF protection and must see the same authority.
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $vpn_forwarded_proto;
    }

    location ^~ /api/ {
        proxy_pass http://admin:8000;
        proxy_http_version 1.1;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $vpn_forwarded_proto;

        add_header Cache-Control "no-store" always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy same-origin always;
        add_header X-Frame-Options DENY always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; connect-src 'self'; font-src 'self'; form-action 'self'; frame-ancestors 'none'; img-src 'self' data:; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'" always;
    }

    # Operational endpoints are container-network only. Keep these exact
    # denials ahead of the SPA fallback if proxy routes change later.
    location = /metrics {
        return 404;
    }

    location = /health {
        return 404;
    }

    location = /ready {
        return 404;
    }
}
